language: en
reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_instructions:
    - path: "lib/**"
      instructions: |
        Follow MVVM + Clean Architecture.
        Layer rules: View → ViewModel → Repository → Service.
        State management: Riverpod.
        UI library: Forui.
        No Co-Authored-By in commits.
    - path: "test/**"
      instructions: "Verify test coverage for new code. Use Patrol for E2E tests."
    - path: "assets/profiles/**"
      instructions: "Engine profile JSON. Verify regex patterns are valid and tested."
chat:
  auto_reply: true
